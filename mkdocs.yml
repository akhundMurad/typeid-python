site_name: TypeID
site_description: Explainable, prefix-based identifiers for Python

repo_name: akhundMurad/typeid-python
repo_url: https://github.com/akhundMurad/typeid-python

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

plugins:
  - search
  - git-revision-date-localized
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_signature_annotations: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Index: index.md
  - Quickstart: quickstart.md
  - Performance: performance.md
  - Concepts: concepts.md
  - Explain: explain.md
  - Framework Integrations:
    - Overview: integrations/index.md
    - Pydantic: integrations/pydantic.md
  - Reference:
      - TypeID: reference/typeid.md
      - Explain: reference/explain.md
      - CLI: reference/cli.md
      - Factory: reference/factory.md
      - Framework Integrations:
        - Pydantic:
          - v2: reference/integrations/pydantic/v2.md
  - Contributing: contributing.md
