name: Publish to TestPyPI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag like v0.3.4-rc1, branch, or SHA). Default: current ref."
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  pr:
    uses: ./.github/workflows/pr.yml

  build-wheels:
    runs-on: ${{ matrix.os }}
    needs:
      - test
      - docs
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build wheels (Rust-enabled)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          working-directory: rust-base32
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: rust-base32/dist/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    needs:
      - test
      - docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync deps (including build tools)
        run: |
          uv sync --all-extras --dev

      - name: Build sdist
        run: |
          make build-sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten dist directory
        shell: bash
        run: |
          mkdir -p out
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -maxdepth 4 -print -exec cp {} out/ \;
          ls -la out

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: out
